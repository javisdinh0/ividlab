<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 240" width="100%" height="100%">
  <!-- Smooth Continuous Solid Vector Line Art (Chỉ giữ phần biểu tượng trong ô khoanh đỏ, các nét liền mịn 100%) -->
  <g stroke="#2B4E64" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    
    <!-- 1. Khung mặt đứng tòa nhà bên trái -->
    <polygon points="62,82 208,62 208,180 62,180" stroke-width="5" />

    <!-- 2. Biểu tượng chữ V 3D rỗng bên trong -->
    <polygon points="85,92 122,185 158,102 196,102 154,185 122,185 85,92" stroke-width="4.5" />

    <!-- 3. Nét mái nghiêng kéo dài sang phải -->
    <path d="M 208,62 L 235,46 L 440,126" stroke-width="5" />

    <!-- 4. Nét dóng chân móng kéo dài từ trái sang phải -->
    <path d="M 122,202 L 440,202" stroke-width="5" />

    <!-- 5. Nét nối chân mặt đứng với móng -->
    <path d="M 208,180 L 122,202" stroke-width="5" />

    <!-- 6. Các đường dầm dóng ngang nét liền mượt mịn (Ocean Blue) -->
    <line x1="225" y1="75" x2="440" y2="139" stroke="#2E6583" stroke-width="4" />
    <line x1="225" y1="95" x2="440" y2="151" stroke="#2E6583" stroke-width="4" />
    <line x1="225" y1="115" x2="440" y2="164" stroke="#2E6583" stroke-width="4" />
    <line x1="225" y1="135" x2="440" y2="177" stroke="#2E6583" stroke-width="4" />
    <line x1="225" y1="155" x2="440" y2="190" stroke="#2E6583" stroke-width="4" />
  </g>
</svg>
